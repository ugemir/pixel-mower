// ===== src/core/level.js =====
// Level validation and art-grid helpers. Pure logic — no DOM, no Canvas.
// Two-resolution grid: board cell (cx, cy) owns art pixels (2cx..2cx+1, 2cy..2cy+1).

function cellHasPixel(art, cx, cy) {
  for (let dy = 0; dy < 2; dy++) {
    for (let dx = 0; dx < 2; dx++) {
      if (art[cy * 2 + dy][cx * 2 + dx] !== '.') return true;
    }
  }
  return false;
}

function countColors(art) {
  const counts = {};
  for (const row of art) {
    for (const ch of row) {
      if (ch !== '.') counts[ch] = (counts[ch] || 0) + 1;
    }
  }
  return counts;
}

function buildFootprint(level) {
  const footprint = [];
  for (let cy = 0; cy < level.boardSize; cy++) {
    const row = [];
    for (let cx = 0; cx < level.boardSize; cx++) row.push(cellHasPixel(level.art, cx, cy));
    footprint.push(row);
  }
  return footprint;
}

function validateLevel(level, { minPixels = 500, maxPixels = 700 } = {}) {
  const { boardSize, artSize, palette, boxCapacity, activeTrucks, bufferSpots, boxes, baseColor, spawn, art } = level;

  if (artSize !== boardSize * 2) {
    throw new Error(`artSize must be boardSize*2 (got artSize=${artSize}, boardSize=${boardSize})`);
  }
  if (!Array.isArray(art) || art.length !== artSize || art.some((r) => r.length !== artSize)) {
    throw new Error(`art must be ${artSize} rows of ${artSize} chars`);
  }

  const counts = countColors(art);
  for (const color of Object.keys(counts)) {
    if (!(color in palette)) throw new Error(`art color '${color}' missing from palette`);
  }

  const total = Object.values(counts).reduce((a, b) => a + b, 0);
  if (total < minPixels || total > maxPixels) {
    throw new Error(`pixel count ${total} outside allowed range ${minPixels}-${maxPixels}`);
  }

  if (!Number.isInteger(boxCapacity) || boxCapacity < 1) throw new Error('boxCapacity must be >= 1');
  if (!Number.isInteger(activeTrucks) || activeTrucks < 1) throw new Error('activeTrucks must be >= 1');
  if (!Number.isInteger(bufferSpots) || bufferSpots < 1) throw new Error('bufferSpots must be >= 1');
  if (!Array.isArray(boxes)) throw new Error('boxes queue must be an array');
  if (!(baseColor in palette)) throw new Error(`baseColor '${baseColor}' missing from palette`);

  const boxCounts = {};
  for (const color of boxes) {
    if (!(color in palette)) throw new Error(`box color '${color}' missing from palette`);
    boxCounts[color] = (boxCounts[color] || 0) + 1;
  }
  for (const [color, count] of Object.entries(counts)) {
    if (count % boxCapacity !== 0) {
      throw new Error(`color '${color}' count ${count} not divisible by boxCapacity ${boxCapacity}`);
    }
    if ((boxCounts[color] || 0) !== count / boxCapacity) {
      throw new Error(
        `color '${color}' needs ${count / boxCapacity} boxes in queue, found ${boxCounts[color] || 0}`
      );
    }
  }
  for (const color of Object.keys(boxCounts)) {
    if (!(color in counts)) throw new Error(`box color '${color}' has no pixels in art`);
  }

  const footprint = buildFootprint(level);
  assertContiguous(footprint, boardSize);

  if (!Array.isArray(spawn) || spawn.length !== 2) throw new Error('spawn must be [head, tail]');
  for (const cell of spawn) {
    if (!footprint[cell.y]?.[cell.x]) {
      throw new Error(`spawn cell (${cell.x},${cell.y}) outside footprint`);
    }
  }
  const dist = Math.abs(spawn[0].x - spawn[1].x) + Math.abs(spawn[0].y - spawn[1].y);
  if (dist !== 1) throw new Error('spawn head and tail must be adjacent');
}

function assertContiguous(footprint, size) {
  let start = null;
  let totalCells = 0;
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      if (footprint[y][x]) {
        totalCells++;
        if (!start) start = { x, y };
      }
    }
  }
  if (!start) throw new Error('footprint is empty');

  const seen = new Set([`${start.x},${start.y}`]);
  const queue = [start];
  while (queue.length) {
    const { x, y } = queue.pop();
    for (const [dx, dy] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
      const nx = x + dx;
      const ny = y + dy;
      const key = `${nx},${ny}`;
      if (nx >= 0 && nx < size && ny >= 0 && ny < size && footprint[ny][nx] && !seen.has(key)) {
        seen.add(key);
        queue.push({ x: nx, y: ny });
      }
    }
  }
  if (seen.size !== totalCells) {
    throw new Error(`footprint not contiguous (${seen.size} reachable of ${totalCells})`);
  }
}

// ===== src/core/mower.js =====
// Mower movement rules. Pure logic — no DOM, no Canvas.
// The mower is 1x2: a head cell and a tail cell, always adjacent.

function legal(footprint, x, y) {
  return y >= 0 && y < footprint.length && x >= 0 && x < footprint[0].length && footprint[y][x];
}

// Greedy chase toward target: step along the larger-delta axis, fall back to
// the other axis if blocked. No pathfinding — the player steers around
// obstacles, which is the game.
function chooseStep(footprint, head, target) {
  if (!target || (target.x === head.x && target.y === head.y)) return null;
  const dx = target.x - head.x;
  const dy = target.y - head.y;
  const horizontal = { dx: Math.sign(dx), dy: 0 };
  const vertical = { dx: 0, dy: Math.sign(dy) };
  const order = Math.abs(dx) >= Math.abs(dy) ? [horizontal, vertical] : [vertical, horizontal];
  for (const dir of order) {
    if ((dir.dx || dir.dy) && legal(footprint, head.x + dir.dx, head.y + dir.dy)) return dir;
  }
  return null;
}

function applyStep(mower, dir) {
  mower.tail = { ...mower.head };
  mower.head = { x: mower.head.x + dir.dx, y: mower.head.y + dir.dy };
}

// ===== src/core/collection.js =====
// Lane-based collection system. Pure logic — no DOM, no Canvas.
//
// The level's box list is dealt round-robin into lanes. Each lane shows its
// front box (active, fillable) with the next boxes waiting behind it. Cut
// units route: matching front → matching buffer stack → empty buffer spot →
// overflow (level fail). Buffer spots hold up to `capacity` units of one
// color and drain automatically into arriving fronts.

function createCollection(level) {
  const laneCount = level.activeTrucks;
  const lanes = Array.from({ length: laneCount }, () => ({ front: null, queue: [] }));
  level.boxes.forEach((color, i) => lanes[i % laneCount].queue.push(color));
  return {
    capacity: level.boxCapacity,
    baseColor: level.baseColor,
    lanes,
    buffer: Array(level.bufferSpots).fill(null),
  };
}

// Advance a lane: its next box becomes the front. Dispatcher rule: every
// mowing path is forced over base-color pixels, so if no front anywhere
// accepts the base color the level can dead-end silently — in that case the
// lane's next base box is pulled forward instead of its queue head.
function advanceLane(col, lane, events) {
  if (!lane.queue.length) {
    lane.front = null;
    return;
  }
  let takeIndex = 0;
  const baseElsewhere = col.lanes.some((l) => l !== lane && l.front?.color === col.baseColor);
  if (!baseElsewhere && lane.queue[0] !== col.baseColor) {
    const j = lane.queue.indexOf(col.baseColor);
    if (j !== -1) takeIndex = j;
  }
  const color = lane.queue.splice(takeIndex, 1)[0];
  lane.front = { color, fill: 0 };
  events.push({ type: 'truckArrived', color, lane: col.lanes.indexOf(lane) });
}

// Advance empty lanes and drain buffer into matching fronts until nothing
// changes. Cascades: a drain can fill a front, whose departure advances the
// lane, which may drain more buffer.
function settle(col, events) {
  let changed = true;
  while (changed) {
    changed = false;
    for (const lane of col.lanes) {
      if (!lane.front && lane.queue.length) {
        advanceLane(col, lane, events);
        changed = true;
      }
    }
    for (let i = 0; i < col.buffer.length; i++) {
      const spot = col.buffer[i];
      if (!spot) continue;
      const lane = col.lanes.find((l) => l.front?.color === spot.color && l.front.fill < col.capacity);
      if (!lane) continue;
      const moved = Math.min(spot.count, col.capacity - lane.front.fill);
      lane.front.fill += moved;
      spot.count -= moved;
      if (spot.count === 0) col.buffer[i] = null;
      events.push({ type: 'bufferDrain', color: lane.front.color, spotIndex: i, moved });
      events.push({ type: 'fill', color: lane.front.color, fill: lane.front.fill, capacity: col.capacity });
      departIfFull(col, lane, events);
      changed = true;
    }
  }
}

function routeUnit(col, color) {
  const events = [];
  const lane = col.lanes.find((l) => l.front?.color === color && l.front.fill < col.capacity);
  if (lane) {
    lane.front.fill++;
    events.push({ type: 'fill', color, fill: lane.front.fill, capacity: col.capacity });
    if (departIfFull(col, lane, events)) settle(col, events);
    return events;
  }
  let spotIndex = col.buffer.findIndex((s) => s && s.color === color && s.count < col.capacity);
  if (spotIndex === -1) spotIndex = col.buffer.findIndex((s) => s === null);
  if (spotIndex === -1) return [{ type: 'overflow', color }];
  const spot = col.buffer[spotIndex] ?? (col.buffer[spotIndex] = { color, count: 0 });
  spot.count++;
  events.push({ type: 'bufferAdd', color, spotIndex, count: spot.count });
  return events;
}

function isCollectionDone(col) {
  return col.lanes.every((l) => !l.front && l.queue.length === 0) && col.buffer.every((s) => s === null);
}

function departIfFull(col, lane, events) {
  if (!lane.front || lane.front.fill < col.capacity) return false;
  events.push({ type: 'truckFull', color: lane.front.color, lane: col.lanes.indexOf(lane) });
  lane.front = null;
  return true;
}

// ===== src/core/game.js =====
// Top-level game state machine. Pure logic — no DOM, no Canvas, no timers.
// The shell calls step(state, target, dt) every fixed tick and routes the
// returned events to rendering/audio/haptics. This event contract is what a
// future Unity port consumes.





const MOWER_SPEED = 7; // cells per second
const COMBO_WINDOW = 0.8; // seconds between cuts that keep a combo alive

function createGame(level, opts) {
  validateLevel(level, opts);
  const collection = createCollection(level);
  settle(collection, []); // initial trucks arrive silently
  return {
    level,
    art: level.art.map((row) => row.split('')),
    footprint: buildFootprint(level),
    mower: { head: { ...level.spawn[0] }, tail: { ...level.spawn[1] } },
    collection,
    combo: { count: 0, timer: 0 },
    status: 'playing',
    moveTimer: 0,
    remaining: Object.values(countColors(level.art)).reduce((a, b) => a + b, 0),
  };
}

function step(state, target, dt) {
  if (state.status !== 'playing') return [];
  const events = [];

  if (state.combo.timer > 0) {
    state.combo.timer -= dt;
    if (state.combo.timer <= 0) state.combo.count = 0;
  }

  state.moveTimer += dt;
  const interval = 1 / MOWER_SPEED;
  while (state.moveTimer >= interval && state.status === 'playing') {
    const dir = chooseStep(state.footprint, state.mower.head, target);
    if (!dir) {
      // Blocked or idle: don't bank time, or releasing the finger would
      // cause a burst of instant moves on the next drag.
      state.moveTimer = 0;
      break;
    }
    state.moveTimer -= interval;
    const oldTail = state.mower.tail;
    const oldHead = state.mower.head;
    applyStep(state.mower, dir);
    events.push({ type: 'move', from: { ...oldHead }, to: { ...state.mower.head } });
    // Cut everything the 1x2 body touched this move: the vacated cell, the
    // cell the body still covers, and the newly entered cell. On the first
    // move this is what mows both spawn cells.
    let cutAny = false;
    for (const cell of [oldTail, oldHead, state.mower.head]) {
      if (cutCell(state, cell, events)) cutAny = true;
      if (state.status !== 'playing') break;
    }
    if (cutAny && state.status === 'playing') {
      state.combo.count++;
      state.combo.timer = COMBO_WINDOW;
      events.push({ type: 'combo', count: state.combo.count });
    }
    if (state.status === 'playing' && state.remaining === 0 && isCollectionDone(state.collection)) {
      state.status = 'complete';
      events.push({ type: 'complete' });
    }
  }
  return events;
}

function cutCell(state, cell, events) {
  let cutAny = false;
  for (let dy = 0; dy < 2; dy++) {
    for (let dx = 0; dx < 2; dx++) {
      const ax = cell.x * 2 + dx;
      const ay = cell.y * 2 + dy;
      const color = state.art[ay][ax];
      if (color === '.') continue;
      state.art[ay][ax] = '.';
      state.remaining--;
      cutAny = true;
      events.push({ type: 'cut', color, ax, ay, cell: { x: cell.x, y: cell.y } });
      const routeEvents = routeUnit(state.collection, color);
      events.push(...routeEvents);
      if (routeEvents.some((e) => e.type === 'overflow')) {
        state.status = 'failed';
        events.push({ type: 'failed' });
        return cutAny;
      }
    }
  }
  return cutAny;
}

// ===== src/input/drag.js =====
// Hold & drag input: while the pointer is down, `input.target` is the board
// cell the mower should chase. Pointer Events cover both touch and mouse.

// Target sits above the finger so the finger doesn't hide the mower.
const FINGER_OFFSET_TILES = 1.2;

function createDrag(canvas, getLayout, { onStart } = {}) {
  const input = { active: false, target: null };

  function updateTarget(e) {
    const L = getLayout();
    const rect = canvas.getBoundingClientRect();
    const px = e.clientX - rect.left - L.boardX;
    const py = e.clientY - rect.top - L.boardY - FINGER_OFFSET_TILES * L.cellPx;
    input.target = {
      x: clamp(Math.floor(px / L.cellPx), 0, L.boardSize - 1),
      y: clamp(Math.floor(py / L.cellPx), 0, L.boardSize - 1),
    };
  }

  canvas.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    // onStart gets the tap point (canvas coords) and may claim the tap
    // (UI hit: badge, picker, overlays) by returning false — no drag then.
    const rect = canvas.getBoundingClientRect();
    const point = { x: e.clientX - rect.left, y: e.clientY - rect.top };
    if (onStart?.(point) === false) return;
    canvas.setPointerCapture(e.pointerId);
    input.active = true;
    updateTarget(e);
  });
  canvas.addEventListener('pointermove', (e) => {
    if (input.active) updateTarget(e);
  });
  for (const type of ['pointerup', 'pointercancel']) {
    canvas.addEventListener(type, () => {
      input.active = false;
      input.target = null;
    });
  }

  return input;
}

const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

// ===== src/render/animator.js =====
// Smooths the mower's logical cell positions into continuous render
// coordinates. Logic stays strictly grid-based; only visuals interpolate.

const FOLLOW_RATE = 14; // higher = snappier

function createAnimator(state) {
  const pos = {
    hx: state.mower.head.x,
    hy: state.mower.head.y,
    tx: state.mower.tail.x,
    ty: state.mower.tail.y,
  };
  return {
    pos,
    update(dt) {
      const k = Math.min(1, dt * FOLLOW_RATE);
      pos.hx += (state.mower.head.x - pos.hx) * k;
      pos.hy += (state.mower.head.y - pos.hy) * k;
      pos.tx += (state.mower.tail.x - pos.tx) * k;
      pos.ty += (state.mower.tail.y - pos.ty) * k;
    },
  };
}

// ===== src/render/particles.js =====
// Particle effects: cut bursts, confetti. Shell-side only.

function createParticles() {
  const list = [];

  function spawn(p) {
    list.push({ angle: 0, spin: 0, gravity: 900, ...p, maxLife: p.life });
  }

  return {
    burst(x, y, color, intensity = 1) {
      const n = Math.round(6 + Math.min(intensity, 4) * 3);
      for (let i = 0; i < n; i++) {
        const a = Math.random() * Math.PI * 2;
        const speed = 60 + Math.random() * 140 * Math.min(intensity, 3);
        spawn({
          x, y, color,
          vx: Math.cos(a) * speed,
          vy: Math.sin(a) * speed - 120,
          life: 0.35 + Math.random() * 0.3,
          size: 3 + Math.random() * 3,
          spin: (Math.random() - 0.5) * 12,
        });
      }
    },
    confetti(W, colors) {
      for (let i = 0; i < 140; i++) {
        spawn({
          x: Math.random() * W,
          y: -20 - Math.random() * 120,
          color: colors[i % colors.length],
          vx: (Math.random() - 0.5) * 120,
          vy: 80 + Math.random() * 160,
          gravity: 60,
          life: 2.2 + Math.random() * 1.5,
          size: 5 + Math.random() * 4,
          spin: (Math.random() - 0.5) * 10,
        });
      }
    },
    clear() {
      list.length = 0;
    },
    update(dt) {
      for (let i = list.length - 1; i >= 0; i--) {
        const p = list[i];
        p.life -= dt;
        if (p.life <= 0) {
          list.splice(i, 1);
          continue;
        }
        p.vy += p.gravity * dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.angle += p.spin * dt;
      }
    },
    draw(ctx) {
      for (const p of list) {
        ctx.save();
        ctx.globalAlpha = Math.min(1, (p.life / p.maxLife) * 1.6);
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
        ctx.restore();
      }
    },
  };
}

// ===== src/render/renderer.js =====
// Canvas renderer: layout regions + all drawing. Reads core state, never
// mutates it.

const COLORS = {
  bg: '#5B4B8A',
  frame: '#7A5FC7',
  frameEdge: 'rgba(255,255,255,0.28)',
  gray: '#CFCBD6',
  green: '#7ECB57',
  grid: 'rgba(0,0,0,0.10)',
  speck: 'rgba(0,90,0,0.18)',
  mowerBody: '#E4573D',
  mowerBlade: '#B93A22',
  badge: '#6F58BB',
};

function createRenderer(canvas, state) {
  const ctx = canvas.getContext('2d');
  const r = { layout: null, resize, draw, setState };

  // Point the renderer at a fresh game state (level change) — layout depends
  // on boardSize/bufferSpots/activeTrucks, so recompute it.
  function setState(next) {
    state = next;
    resize();
  }

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    const W = window.innerWidth;
    const H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const boardSize = state.level.boardSize;
    const topH = 58;
    const S = Math.min(W - 30, H * 0.54);
    const boardX = (W - S) / 2;
    const boardY = topH + 16;
    const bufferSpots = state.level.bufferSpots;
    const laneCount = state.level.activeTrucks; // number of lanes
    const slotsY = boardY + S + 22;
    const slotGap = 8;
    const slotW = Math.min((S - slotGap * (bufferSpots - 1)) / bufferSpots, S / 5.2);
    const slotsX = boardX + (S - (slotW * bufferSpots + slotGap * (bufferSpots - 1))) / 2;
    const slotH = Math.min(52, slotW * 0.9);
    const lanesY = slotsY + slotH + 14;
    const laneGap = 14;
    const laneW = Math.min((S - laneGap * (laneCount - 1)) / laneCount, 112);
    const lanesX = boardX + (S - (laneW * laneCount + laneGap * (laneCount - 1))) / 2;
    const laneAvail = H - lanesY - 12;
    const frontH = Math.min(76, laneAvail * 0.42);
    const nextH = Math.max(16, Math.min(26, (laneAvail - frontH - 10) / 3 - 6));
    r.layout = {
      W, H, S, boardX, boardY, cellPx: S / boardSize, boardSize, topH,
      slotsY, slotsX, slotW, slotH, slotGap,
      lanesY, lanesX, laneW, laneGap, frontH, nextH,
      badgeRect: { x: (W - 128) / 2, y: 12, w: 128, h: 40 },
    };
  }

  function draw(state, mpos, extras = {}) {
    const L = r.layout;
    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(0, 0, L.W, L.H);

    drawBadge(L);
    drawBoard(L, state);
    drawMower(L, mpos);
    drawBuffer(L, state, extras.fx);
    drawLanes(L, state, extras.fx);
    if (state.status === 'complete') drawOverlay(L, 'Level Complete!', 'Tap for next level');
    if (state.status === 'failed') drawOverlay(L, 'Out of space!', 'Tap to retry');
    if (extras.pickerOpen) drawPicker(L, extras.levelCount, extras.currentLevel);
    extras.particles?.draw(ctx);
  }

  function drawPicker(L, count, current) {
    ctx.fillStyle = 'rgba(40,25,80,0.82)';
    ctx.fillRect(0, 0, L.W, L.H);
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 24px system-ui, sans-serif';
    const rects = pickerRects(L, count);
    ctx.fillText('Select Level', L.W / 2, rects[0].y - 44);
    for (let i = 0; i < rects.length; i++) {
      const b = rects[i];
      rr(ctx, b.x, b.y, b.w, b.h, 14);
      ctx.fillStyle = i === current ? '#FBD960' : COLORS.badge;
      ctx.fill();
      ctx.strokeStyle = COLORS.frameEdge;
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = i === current ? '#4A3A20' : '#fff';
      ctx.font = 'bold 22px system-ui, sans-serif';
      ctx.fillText(String(i + 1), b.x + b.w / 2, b.y + b.h / 2 + 1);
    }
  }

  // Mini grid showing `fill` of `capacity` units, e.g. 3x3 for capacity 9.
  function drawUnitGrid(x, y, w, h, capacity, fill, paint) {
    const cols = Math.ceil(Math.sqrt(capacity));
    const rows = Math.ceil(capacity / cols);
    const gap = 2;
    const uw = (w - gap * (cols - 1)) / cols;
    const uh = (h - gap * (rows - 1)) / rows;
    for (let i = 0; i < capacity; i++) {
      const cx = x + (i % cols) * (uw + gap);
      // fill bottom-up so trucks visually "load"
      const cy = y + (rows - 1 - Math.floor(i / cols)) * (uh + gap);
      rr(ctx, cx, cy, uw, uh, 3);
      ctx.fillStyle = i < fill ? paint : 'rgba(0,0,0,0.18)';
      ctx.fill();
    }
  }

  // Waiting rack: spots holding same-colored units until a matching box
  // becomes active.
  function drawBuffer(L, state, fx = {}) {
    const capacity = state.collection.capacity;
    for (let i = 0; i < state.collection.buffer.length; i++) {
      const x = L.slotsX + i * (L.slotW + L.slotGap);
      const spot = state.collection.buffer[i];
      const flash = fx.slotFlash?.[i] > 0;
      const grow = flash ? 3 : 0;
      rr(ctx, x - grow, L.slotsY - grow, L.slotW + grow * 2, L.slotH + grow * 2, 10);
      ctx.fillStyle = spot ? shade(state.level.palette[spot.color], 0.8) : '#B7B2C2';
      ctx.fill();
      ctx.strokeStyle = spot ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.15)';
      ctx.lineWidth = 2;
      ctx.stroke();
      drawUnitGrid(
        x + 5, L.slotsY + 5, L.slotW - 10, L.slotH - 10,
        capacity, spot ? spot.count : 0,
        spot ? state.level.palette[spot.color] : '#000'
      );
    }
  }

  // Lanes: each lane's front box fills (open bin with a unit grid); the next
  // boxes wait behind it, smaller and closed (lidded), advancing as fronts
  // depart.
  function drawLanes(L, state, fx = {}) {
    const col = state.collection;
    for (let i = 0; i < col.lanes.length; i++) {
      const lane = col.lanes[i];
      const x = L.lanesX + i * (L.laneW + L.laneGap);

      if (lane.front) {
        const paint = state.level.palette[lane.front.color];
        const pulse = fx.truckPulse?.[lane.front.color] > 0 ? 1.06 : 1;
        ctx.save();
        ctx.translate(x + L.laneW / 2, L.lanesY + L.frontH / 2);
        ctx.scale(pulse, pulse);
        rr(ctx, -L.laneW / 2, -L.frontH / 2, L.laneW, L.frontH, 10);
        ctx.fillStyle = shade(paint, 0.72);
        ctx.fill();
        ctx.strokeStyle = paint;
        ctx.lineWidth = 2.5;
        ctx.stroke();
        drawUnitGrid(
          -L.laneW / 2 + 6, -L.frontH / 2 + 6, L.laneW - 12, L.frontH - 12,
          col.capacity, lane.front.fill, paint
        );
        ctx.restore();
      } else {
        // exhausted lane — faint empty bin
        rr(ctx, x, L.lanesY, L.laneW, L.frontH, 10);
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.fill();
      }

      const w2 = L.laneW * 0.72;
      const x2 = x + (L.laneW - w2) / 2;
      for (let k = 0; k < 3; k++) {
        const color = lane.queue[k];
        if (!color) break;
        const y = L.lanesY + L.frontH + 10 + k * (L.nextH + 6);
        rr(ctx, x2, y, w2, L.nextH, 6);
        ctx.fillStyle = shade(state.level.palette[color], 0.85);
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // closed lid
        rr(ctx, x2 + 3, y + 3, w2 - 6, Math.max(3, L.nextH * 0.28), 3);
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.fill();
      }
      const more = lane.queue.length - 3;
      if (more > 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.font = 'bold 12px system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(`+${more}`, x + L.laneW / 2, L.lanesY + L.frontH + 10 + 3 * (L.nextH + 6) + 2);
      }
    }
  }

  function drawOverlay(L, title, subtitle) {
    ctx.fillStyle = 'rgba(40,25,80,0.72)';
    ctx.fillRect(0, 0, L.W, L.H);
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 34px system-ui, sans-serif';
    ctx.fillText(title, L.W / 2, L.H * 0.42);
    ctx.font = '18px system-ui, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillText(subtitle, L.W / 2, L.H * 0.42 + 40);
  }

  function drawBadge(L) {
    const b = L.badgeRect;
    rr(ctx, b.x, b.y, b.w, b.h, 20);
    ctx.fillStyle = COLORS.badge;
    ctx.fill();
    ctx.strokeStyle = COLORS.frameEdge;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 19px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`Level ${state.level.id} ▾`, L.W / 2, b.y + b.h / 2 + 1);
  }

  function drawBoard(L, state) {
    // Purple frame
    rr(ctx, L.boardX - 10, L.boardY - 10, L.S + 20, L.S + 20, 18);
    ctx.fillStyle = COLORS.frame;
    ctx.fill();
    ctx.strokeStyle = COLORS.frameEdge;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Gray non-playable base (smooth, no grid)
    rr(ctx, L.boardX, L.boardY, L.S, L.S, 10);
    ctx.fillStyle = COLORS.gray;
    ctx.fill();
    ctx.save();
    rr(ctx, L.boardX, L.boardY, L.S, L.S, 10);
    ctx.clip();

    const c = L.cellPx;
    const q = c / 2;
    for (let cy = 0; cy < L.boardSize; cy++) {
      for (let cx = 0; cx < L.boardSize; cx++) {
        if (!state.footprint[cy][cx]) continue;
        const x = L.boardX + cx * c;
        const y = L.boardY + cy * c;
        // Green playable base with grid lines
        ctx.fillStyle = COLORS.green;
        ctx.fillRect(x, y, c, c);
        ctx.strokeStyle = COLORS.grid;
        ctx.lineWidth = 1;
        ctx.strokeRect(x + 0.5, y + 0.5, c - 1, c - 1);

        // Art-pixel quadrants (tall colored grass) or clipping specks
        let cleaned = true;
        for (let dy = 0; dy < 2; dy++) {
          for (let dx = 0; dx < 2; dx++) {
            const color = state.art[cy * 2 + dy][cx * 2 + dx];
            if (color === '.') continue;
            cleaned = false;
            const qx = x + dx * q;
            const qy = y + dy * q;
            ctx.fillStyle = state.level.palette[color];
            ctx.fillRect(qx, qy, q, q);
            // darker top edge = tall grass depth
            ctx.fillStyle = 'rgba(0,0,0,0.14)';
            ctx.fillRect(qx, qy, q, Math.max(1.5, q * 0.16));
          }
        }
        if (cleaned) {
          // Grass clippings on mowed lawn — deterministic per cell
          ctx.fillStyle = COLORS.speck;
          for (let i = 0; i < 3; i++) {
            const sx = x + (((cx * 31 + cy * 17 + i * 47) % 83) / 83) * (c - 4) + 2;
            const sy = y + (((cx * 13 + cy * 29 + i * 71) % 97) / 97) * (c - 4) + 2;
            ctx.fillRect(sx, sy, 2, 2);
          }
        }
      }
    }
    ctx.restore();
  }

  function drawMower(L, mpos) {
    const c = L.cellPx;
    const hx = L.boardX + (mpos.hx + 0.5) * c;
    const hy = L.boardY + (mpos.hy + 0.5) * c;
    const tx = L.boardX + (mpos.tx + 0.5) * c;
    const ty = L.boardY + (mpos.ty + 0.5) * c;
    const angle = Math.atan2(hy - ty, hx - tx);
    const dist = Math.hypot(hx - tx, hy - ty);
    const w = c * 0.74;
    const len = dist + c * 0.74;

    ctx.save();
    ctx.translate((hx + tx) / 2, (hy + ty) / 2);
    ctx.rotate(angle);
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    rr(ctx, -len / 2 + 2, -w / 2 + 3, len, w, w * 0.4);
    ctx.fill();
    // body
    rr(ctx, -len / 2, -w / 2, len, w, w * 0.4);
    ctx.fillStyle = COLORS.mowerBody;
    ctx.fill();
    // front blade strip
    rr(ctx, len / 2 - c * 0.28, -w / 2, c * 0.28, w, w * 0.25);
    ctx.fillStyle = COLORS.mowerBlade;
    ctx.fill();
    // cabin window
    rr(ctx, -len / 2 + c * 0.14, -w * 0.28, c * 0.5, w * 0.56, 5);
    ctx.fillStyle = '#FBD960';
    ctx.fill();
    // eyes near the front — cute toy face
    ctx.fillStyle = '#fff';
    for (const s of [-1, 1]) {
      ctx.beginPath();
      ctx.arc(len / 2 - c * 0.45, s * w * 0.2, w * 0.13, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = '#333';
    for (const s of [-1, 1]) {
      ctx.beginPath();
      ctx.arc(len / 2 - c * 0.42, s * w * 0.2, w * 0.06, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  resize();
  return r;
}

// Level-picker button rectangles — shared by drawPicker and main's hit-test.
function pickerRects(L, count) {
  const cols = 3;
  const w = 72;
  const h = 56;
  const gap = 14;
  const rows = Math.ceil(count / cols);
  const gridW = cols * w + (cols - 1) * gap;
  const gridH = rows * h + (rows - 1) * gap;
  const x0 = (L.W - gridW) / 2;
  const y0 = (L.H - gridH) / 2 - 20;
  const rects = [];
  for (let i = 0; i < count; i++) {
    rects.push({
      x: x0 + (i % cols) * (w + gap),
      y: y0 + Math.floor(i / cols) * (h + gap),
      w,
      h,
    });
  }
  return rects;
}

function shade(hex, f) {
  const n = parseInt(hex.slice(1), 16);
  const c = (v) => Math.round(Math.min(255, v * f));
  return `rgb(${c(n >> 16)},${c((n >> 8) & 255)},${c(n & 255)})`;
}

function rr(ctx, x, y, w, h, radius) {
  ctx.beginPath();
  if (ctx.roundRect) {
    ctx.roundRect(x, y, w, h, radius);
  } else {
    const r = Math.min(radius, w / 2, h / 2);
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }
}

// ===== src/audio.js =====
// Synthesized sound effects via Web Audio — no asset files.
// Mobile browsers require a user gesture before audio can play:
// call unlockAudio() from the first pointerdown.

let actx = null;

function unlockAudio() {
  if (!actx) {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    actx = new Ctx();
  }
  if (actx.state === 'suspended') actx.resume();
}

function tone(freq, dur, { type = 'triangle', gain = 0.12, delay = 0 } = {}) {
  if (!actx || actx.state !== 'running') return;
  const t0 = actx.currentTime + delay;
  const osc = actx.createOscillator();
  const g = actx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  g.gain.setValueAtTime(gain, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  osc.connect(g).connect(actx.destination);
  osc.start(t0);
  osc.stop(t0 + dur);
}

// Cut blip — pitch rises with combo for that "keep mowing" pull.
function blip(combo) {
  tone(280 * 1.059 ** Math.min(combo, 24), 0.07, { gain: 0.1 });
}

function chime() {
  tone(660, 0.12);
  tone(880, 0.16, { delay: 0.09 });
}

function fanfare() {
  [523, 659, 784, 1047].forEach((f, i) => tone(f, 0.18, { delay: i * 0.09, gain: 0.14 }));
}

function thud() {
  tone(130, 0.35, { type: 'sawtooth', gain: 0.18 });
  tone(98, 0.45, { type: 'sawtooth', gain: 0.14, delay: 0.12 });
}

// ===== src/main.js =====
// Shell entry point — wires core game state to canvas, input, and audio.
// Fixed-timestep logic updates, rAF rendering. Core emits events; everything
// cosmetic (particles, sound, haptics, pulses) is routed here.









const canvas = document.getElementById('game');
// ?level=N jumps straight to a level for testing (1-based).
const requested = parseInt(new URLSearchParams(location.search).get('level'), 10);
let levelIdx = Math.min(Math.max((requested || 1) - 1, 0), levels.length - 1);

let state = createGame(levels[levelIdx]);
const renderer = createRenderer(canvas, state);
let animator = createAnimator(state);
const particles = createParticles();

function loadLevel(i) {
  levelIdx = i;
  state = createGame(levels[i]);
  animator = createAnimator(state);
  renderer.setState(state);
  particles.clear();
  fx.truckPulse = {};
  fx.slotFlash = {};
}

const ui = { pickerOpen: false };
const inRect = (p, b) => p.x >= b.x && p.x <= b.x + b.w && p.y >= b.y && p.y <= b.y + b.h;

const input = createDrag(canvas, () => renderer.layout, {
  onStart: (point) => {
    unlockAudio();
    if (ui.pickerOpen) {
      const hit = pickerRects(renderer.layout, levels.length).findIndex((b) => inRect(point, b));
      ui.pickerOpen = false;
      if (hit >= 0) loadLevel(hit);
      return false;
    }
    if (inRect(point, renderer.layout.badgeRect)) {
      ui.pickerOpen = true;
      return false;
    }
    if (state.status === 'complete') {
      loadLevel((levelIdx + 1) % levels.length);
      return false;
    }
    if (state.status === 'failed') {
      loadLevel(levelIdx);
      return false;
    }
  },
});

// Shell-side cosmetic timers (truck pulse, slot flash) — never in core state.
const fx = { truckPulse: {}, slotFlash: {} };

function cellCenter(cell) {
  const L = renderer.layout;
  return {
    x: L.boardX + (cell.x + 0.5) * L.cellPx,
    y: L.boardY + (cell.y + 0.5) * L.cellPx,
  };
}

function handleEvents(events) {
  for (const e of events) {
    switch (e.type) {
      case 'cut': {
        const { x, y } = cellCenter(e.cell);
        const intensity = 1 + Math.min(state.combo.count, 12) * 0.25;
        particles.burst(x, y, state.level.palette[e.color], intensity);
        break;
      }
      case 'combo':
        blip(e.count);
        navigator.vibrate?.(10);
        break;
      case 'truckArrived':
        fx.truckPulse[e.color] = 0.35;
        break;
      case 'truckFull':
        chime();
        fx.truckPulse[e.color] = 0.4;
        navigator.vibrate?.([20, 30, 20]);
        break;
      case 'bufferAdd':
        fx.slotFlash[e.spotIndex] = 0.35;
        break;
      case 'bufferDrain':
        fx.slotFlash[e.spotIndex] = 0.35;
        break;
      case 'failed':
        thud();
        navigator.vibrate?.(200);
        break;
      case 'complete':
        fanfare();
        particles.confetti(renderer.layout.W, Object.values(state.level.palette));
        break;
    }
  }
}

function decayFx(obj, dt) {
  for (const k of Object.keys(obj)) {
    obj[k] -= dt;
    if (obj[k] <= 0) delete obj[k];
  }
}

const FIXED_DT = 1 / 60;
let last = performance.now();
let acc = 0;

function frame(now) {
  const frameDt = Math.min(0.1, (now - last) / 1000);
  last = now;
  acc += frameDt;
  while (acc >= FIXED_DT) {
    handleEvents(step(state, input.active ? input.target : null, FIXED_DT));
    acc -= FIXED_DT;
  }
  animator.update(frameDt);
  particles.update(frameDt);
  decayFx(fx.truckPulse, frameDt);
  decayFx(fx.slotFlash, frameDt);
  renderer.draw(state, animator.pos, {
    particles,
    fx,
    pickerOpen: ui.pickerOpen,
    currentLevel: levelIdx,
    levelCount: levels.length,
  });
  requestAnimationFrame(frame);
}

window.addEventListener('resize', () => renderer.resize());
requestAnimationFrame(frame);

  </script>
